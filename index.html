<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="VoteWise — A neutral, structured civic guidance system helping Indian voters navigate the election process from registration to voting day." />
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="dark light" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="VoteWise — Your Guide to Indian Elections" />
    <meta property="og:description" content="Neutral, fact-based civic guidance for Indian voters. Find your polling booth, understand the voting process, and explore candidate data." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_IN" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Content Security Policy: restrict where scripts/frames/connections can load from -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.openstreetmap.org https://maps.googleapis.com https://maps.gstatic.com https://www.google-analytics.com; connect-src 'self' https://nominatim.openstreetmap.org https://api.featherless.ai https://www.google-analytics.com https://*.analytics.google.com; frame-src 'self' https://www.openstreetmap.org https://www.google.com https://maps.google.com;" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Google Analytics 4 (loaded only when measurement ID is configured at build time) -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('js', new Date());
      // GA Measurement ID is wired in via the dynamic loader below.
    </script>
    <script type="module">
      const measurementId = import.meta.env.VITE_GA_MEASUREMENT_ID;
      if (measurementId) {
        const s = document.createElement('script');
        s.async = true;
        s.src = `https://www.googletagmanager.com/gtag/js?id=${measurementId}`;
        document.head.appendChild(s);
        window.gtag('config', measurementId, { send_page_view: false });
      }
    </script>

    <title>VoteWise — Your Guide to Indian Elections</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <p style="padding: 2rem; text-align: center; font-family: sans-serif;">
        VoteWise needs JavaScript to run. Please enable it in your browser, or visit
        <a href="https://voters.eci.gov.in">voters.eci.gov.in</a> for official voter information.
      </p>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
