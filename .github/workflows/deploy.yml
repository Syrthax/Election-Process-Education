name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:run

      - name: Build
        env:
          # Build-time env vars become public — they're inlined into the
          # client bundle. For a long-lived public site, move the
          # Featherless/Maps calls behind a serverless proxy.
          VITE_FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API }}
          VITE_FEATHERLESS_MODEL: ${{ vars.FEATHERLESS_MODEL || 'google/gemma-2-9b-it' }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          VITE_GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Add SPA fallback (copy index.html to 404.html)
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
